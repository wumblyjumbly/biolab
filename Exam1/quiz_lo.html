<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIO 212 LO Quiz</title>
<style>
:root{
  --bg:#0d0f18;--card:#161926;--card2:#1e2235;
  --accent:#4f8ef7;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;
  --text:#e2e8f0;--muted:#8892a4;--border:#252a40;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}

/* ── NAV ── */
nav{position:sticky;top:0;z-index:200;background:rgba(13,15,24,.97);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;height:52px;gap:2px;}
.logo{font-weight:700;font-size:.95rem;color:var(--accent);margin-right:auto;white-space:nowrap;text-decoration:none;}
nav button{background:none;border:none;color:var(--muted);font-size:.8rem;padding:6px 14px;cursor:pointer;
  border-bottom:2px solid transparent;height:52px;transition:all .15s;}
nav button.active,nav button:hover{color:var(--text);border-bottom-color:var(--accent);}

/* ── PAGES ── */
.page{display:none;max-width:860px;margin:0 auto;padding:28px 20px 60px;}
.page.active{display:block;}
h1{font-size:1.4rem;margin-bottom:6px;}
.sub{color:var(--muted);font-size:.85rem;margin-bottom:24px;}

/* ── SETUP ── */
.setup-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.setup-title{font-size:1.15rem;font-weight:800;
  background:linear-gradient(135deg,#4f8ef7 0%,#a78bfa 60%,#f472b6 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.setup-chips{display:flex;gap:6px;}
.setup-chip{background:var(--card2);border:1px solid var(--border);border-radius:99px;
  font-size:.67rem;padding:3px 9px;color:var(--muted);}
.setup-chip span{color:var(--text);font-weight:600;}
.setup-controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  margin-top:16px;padding-top:16px;border-top:1px solid var(--border);}
.mode-seg{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.mode-seg button{background:var(--card);border:none;border-right:1px solid var(--border);
  color:var(--muted);font-size:.85rem;font-weight:500;
  padding:10px 20px;cursor:pointer;transition:background .15s,color .15s;white-space:nowrap;}
.mode-seg button:last-child{border-right:none;}
.mode-seg button:hover{color:var(--text);background:var(--card2);}
.mode-seg button.active{background:var(--accent);color:#fff;font-weight:700;}
.count-seg{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.count-seg button{background:var(--card);border:none;border-right:1px solid var(--border);
  color:var(--muted);font-size:.82rem;font-weight:500;
  padding:10px 14px;cursor:pointer;transition:background .15s,color .15s;white-space:nowrap;}
.count-seg button:last-child{border-right:none;}
.count-seg button:hover{color:var(--text);background:var(--card2);}
.count-seg button.active{background:var(--card2);color:var(--text);font-weight:700;}

/* ── CATEGORY PILLS ── */
.cat-label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cat-label-row label{font-size:.78rem;color:var(--muted);}
.cat-label-row button{font-size:.68rem;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;}
.cat-label-row button:hover{text-decoration:underline;}
.cat-pills{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.cat-group{display:flex;flex-direction:column;gap:5px;}
.cat-pill{display:flex;flex-direction:column;align-items:flex-start;gap:3px;
  padding:10px 12px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--card);color:var(--muted);
  cursor:pointer;user-select:none;transition:border-color .15s,background .15s,color .15s;}
.cat-pill:hover{color:var(--text);}
.cat-pill.on{color:var(--text);}
.cat-pill .cp-icon{font-size:1.4rem;line-height:1;margin-bottom:2px;}
.cat-pill .cp-label{font-size:.75rem;font-weight:600;line-height:1.3;}
.cat-pill .cp-count{font-size:.62rem;opacity:.55;}
.pool-preview{font-size:.74rem;color:var(--muted);margin-top:8px;min-height:1.1em;}
.cat-pill.struggling{border-color:rgba(245,158,11,.5);background:rgba(245,158,11,.06);color:var(--amber);}
.cat-pill.struggling.on{border-color:var(--amber);background:rgba(245,158,11,.15);}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;background:var(--accent);border:none;color:#fff;
  border-radius:8px;padding:10px 22px;cursor:pointer;font-size:.875rem;font-weight:600;
  transition:opacity .15s,transform .12s,box-shadow .15s;}
.btn:hover{opacity:.88;}
.btn.sec{background:var(--card);border:1px solid var(--border);color:var(--text);}
.btn.ghost{background:none;border:1px solid var(--border);color:var(--muted);}
.btn.ghost:hover{color:var(--text);border-color:var(--accent);}
.btn.primary{background:linear-gradient(135deg,#4f8ef7,#7c3aed);
  box-shadow:0 4px 20px rgba(79,142,247,.35);font-size:.95rem;padding:12px 28px;}
.btn.primary:hover{opacity:1;transform:translateY(-2px);box-shadow:0 6px 28px rgba(79,142,247,.5);}
.btn.shuffle{background:linear-gradient(135deg,#059669,#0891b2);
  box-shadow:0 4px 16px rgba(8,145,178,.3);}
.btn.shuffle:hover{opacity:1;transform:translateY(-2px);}

/* ── PROGRESS BAR ── */
.prog-wrap{margin-bottom:20px;}
.prog-bar{height:7px;background:var(--border);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,#4f8ef7,#a78bfa);border-radius:99px;transition:width .4s ease;}
.prog-label{display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted);margin-top:6px;}

/* ── QUESTION CARD ── */
.q-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;}
.q-header{padding:14px 20px 0;display:flex;align-items:center;gap:8px;}
.q-num{font-size:.78rem;color:var(--muted);}
.q-tag{background:rgba(79,142,247,.12);color:var(--accent);font-size:.7rem;border-radius:99px;padding:2px 9px;}
.q-pts{font-size:.7rem;color:var(--muted);margin-left:auto;}
.q-body{padding:16px 20px 20px;font-size:.95rem;line-height:1.65;}

/* ── OPTIONS ── */
@keyframes optIn{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:none}}
.opts{padding:0 20px 4px;display:flex;flex-direction:column;gap:9px;}
.opt{background:#11141f;border:1px solid var(--border);border-radius:12px;
  padding:12px 16px;cursor:pointer;font-size:.875rem;display:flex;align-items:flex-start;gap:12px;
  transition:border-color .12s,background .12s,transform .1s,box-shadow .12s;line-height:1.5;
  animation:optIn .22s ease both;}
.opt:hover:not(.locked){border-color:var(--accent);background:rgba(79,142,247,.07);transform:translateX(3px);}
.ltr{min-width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;
  flex-shrink:0;margin-top:1px;transition:all .15s;}
.opt.correct{border-color:var(--green);background:rgba(34,197,94,.08);box-shadow:0 0 0 1px rgba(34,197,94,.15);}
.opt.correct .ltr{background:var(--green);border-color:var(--green);color:#fff;}
.opt.wrong{border-color:var(--red);background:rgba(239,68,68,.08);box-shadow:0 0 0 1px rgba(239,68,68,.15);}
.opt.wrong .ltr{background:var(--red);border-color:var(--red);color:#fff;}
.opt.locked{cursor:default;}
.opt.show-correct{border-color:rgba(34,197,94,.5);}
.opt.show-correct .ltr{border-color:var(--green);color:var(--green);}

/* ── FREE TEXT ── */
.fib-wrap{padding:0 20px 4px;}
.fib-input{background:#11141f;border:1px solid var(--border);border-radius:10px;
  padding:11px 16px;width:100%;font-size:.875rem;color:var(--text);outline:none;transition:border-color .12s;}
.fib-input:focus{border-color:var(--accent);}
.fib-input.correct{border-color:var(--green);background:rgba(34,197,94,.07);}
.fib-input.wrong{border-color:var(--red);background:rgba(239,68,68,.07);}
.fib-check-btn{margin-top:8px;}

/* ── FEEDBACK ── */
@keyframes fbIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.feedback{margin:12px 20px 0;padding:14px 18px;border-radius:12px;
  font-size:.84rem;line-height:1.65;display:none;font-weight:500;}
.feedback.show{display:block;animation:fbIn .2s ease both;}
.feedback.ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#86efac;}
.feedback.no{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;}
.feedback .exp{font-size:.79rem;margin-top:7px;opacity:.85;font-weight:400;font-style:italic;
  padding-top:7px;border-top:1px solid rgba(255,255,255,.1);}

/* ── QUIZ NAV ── */
.q-nav{padding:14px 20px 18px;display:flex;gap:10px;border-top:1px solid var(--border);margin-top:10px;}
.q-nav .go{margin-left:auto;}

/* ── RESULTS ── */
@keyframes ringPop{from{transform:rotate(-90deg) scale(.8);opacity:0}to{transform:rotate(-90deg) scale(1);opacity:1}}
.results{text-align:center;padding:40px 20px 20px;}
.ring-wrap{width:140px;height:140px;margin:0 auto 18px;position:relative;}
.ring-wrap svg{transform:rotate(-90deg);animation:ringPop .5s cubic-bezier(.34,1.56,.64,1) both;}
.ring-txt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-pct{font-size:2rem;font-weight:800;background:linear-gradient(135deg,#4f8ef7,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ring-sub{font-size:.68rem;color:var(--muted);}
.stat-row{display:flex;gap:10px;justify-content:center;margin:16px 0 26px;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 20px;text-align:center;}
.stat .val{font-size:1.4rem;font-weight:700;color:var(--accent);}
.stat .lbl{font-size:.68rem;color:var(--muted);margin-top:2px;}
.act-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

/* ── BROWSE ── */
.browse-q{background:var(--card);border:1px solid var(--border);border-radius:12px;
  margin-bottom:14px;overflow:hidden;}
.browse-header{padding:12px 16px;border-bottom:1px solid var(--border);
  font-size:.8rem;color:var(--muted);display:flex;align-items:center;gap:8px;}
.browse-body{padding:12px 16px;font-size:.88rem;line-height:1.6;}
.browse-answers{padding:0 16px 12px;font-size:.82rem;}
.browse-answers .ba{padding:5px 10px;border-radius:6px;margin-top:4px;display:flex;align-items:center;gap:8px;}
.ba.ok{background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.2);}
.ba .bk{width:16px;height:16px;border-radius:50%;background:var(--border);
  font-size:.6rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ba.ok .bk{background:var(--green);color:#fff;}

/* ── PROGRESS PAGE ── */
.pg-sect{margin-bottom:28px;}
.pg-title{font-size:.75rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  color:var(--muted);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.ov-grid{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px;}
.ov-card{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:14px 16px;flex:1;min-width:90px;text-align:center;}
.ov-card .ov-v{font-size:1.5rem;font-weight:700;}
.ov-card .ov-l{font-size:.67rem;color:var(--muted);margin-top:3px;line-height:1.3;}
.struggle-banner{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);
  border-radius:12px;padding:16px 18px;margin-bottom:28px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.struggle-banner h3{font-size:.95rem;margin-bottom:4px;}
.struggle-banner p{font-size:.78rem;color:var(--muted);}
.cat-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border);}
.cat-row:last-child{border-bottom:none;}
.cr-name{font-size:.84rem;min-width:175px;flex-shrink:0;}
.cr-bar{flex:1;height:7px;background:var(--border);border-radius:99px;overflow:hidden;min-width:40px;}
.cr-fill{height:100%;border-radius:99px;transition:width .4s;}
.cr-acc{font-size:.78rem;font-weight:700;min-width:36px;text-align:right;}
.cr-badge{font-size:.7rem;min-width:88px;text-align:right;line-height:1.4;}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty h2{font-size:1.1rem;margin-bottom:8px;color:var(--text);}

/* ── MODAL (image zoom) ── */
#modal{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.9);
  align-items:center;justify-content:center;padding:20px;}
#modal.open{display:flex;}
#modal-inner{position:relative;max-width:92vw;max-height:92vh;overflow:auto;}
#modal-img{max-width:100%;max-height:88vh;border-radius:10px;display:block;}
#modal-close{position:fixed;top:16px;right:16px;background:rgba(0,0,0,.7);
  border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:50%;width:34px;height:34px;
  font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* ── ADDITIONAL OPT STATES ── */
.opt.selected-ma{border-color:var(--accent);background:rgba(79,142,247,.12);}
.opt.selected-ma .ltr{background:var(--accent);border-color:var(--accent);color:#fff;}
.feedback.info{background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.3);color:#93c5fd;}
.q-body img{max-width:100%;height:auto;border-radius:8px;margin:8px 0;display:block;cursor:zoom-in;
  border:1px solid var(--border);}
.q-body p{margin-bottom:.5em;}
.browse-body img{max-width:100%;height:auto;border-radius:6px;margin:6px 0;
  border:1px solid var(--border);cursor:zoom-in;}

/* ── SUB-CATEGORY PILLS ── */
.cat-subpills{display:flex;flex-wrap:wrap;gap:4px;padding-left:8px;}
.cat-subpill{display:inline-flex;align-items:center;gap:6px;
  padding:6px 11px;border-radius:8px;
  border:1.5px dashed var(--border);background:var(--card);color:var(--muted);
  cursor:pointer;user-select:none;font-size:.74rem;font-weight:600;
  transition:border-color .15s,background .15s,color .15s;}
.cat-subpill:hover{color:var(--text);}
.cat-subpill.on{color:var(--text);}
.cat-subpill .sp-icon{font-size:1rem;}

@media(max-width:640px){
  nav{overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;padding:0 12px;}
  nav::-webkit-scrollbar{display:none}
  .page{padding:20px 14px 60px;}
  .cat-pills{grid-template-columns:repeat(2,1fr);}
  .stat-row{gap:6px;}
  .stat{padding:10px 12px;}
  .cr-name{min-width:120px;}
  .cr-badge{min-width:70px;}
  .q-nav{padding:10px 12px 14px;gap:6px;flex-wrap:wrap;}
  .q-nav .go{margin-left:0;}
  .q-nav .btn{padding:8px 11px;font-size:.8rem;}
  .setup-controls .btn.primary{margin-left:0;}
}
</style>
</head>
<body>

<nav>
  <a href="quiz_lo.html" class="logo">BIO 212 · LO Quiz</a>
  <button class="active" id="nav-btn-quiz" onclick="showTab('quiz',this)">Quiz</button>
  <button onclick="showTab('browse',this)">Browse All</button>
  <button onclick="showTab('progress',this)">Progress</button>
</nav>

<!-- ══════════ QUIZ TAB ══════════ -->
<div class="page active" id="page-quiz">

  <!-- SETUP -->
  <div id="pane-setup">
    <div class="setup-header">
      <div class="setup-title">BIO 212 · Learning Objectives Quiz</div>
      <div class="setup-chips">
        <div class="setup-chip"><span id="setup-q-count">111</span> questions</div>
      </div>
    </div>

    <div class="cat-label-row">
      <label>Categories</label>
      <button onclick="toggleAllCats()">All / None</button>
    </div>
    <div class="cat-pills" id="cat-pills"></div>
    <div class="pool-preview" id="pool-preview"></div>

    <div class="setup-controls">
      <div class="mode-seg">
        <button id="mode-mc" onclick="setAnswerMode('mc')">Multiple Choice</button>
        <button class="active" id="mode-ft" onclick="setAnswerMode('ft')">✏️ Free Text</button>
      </div>
      <div class="count-seg" id="count-seg">
        <button onclick="setCount('10',this)">10</button>
        <button onclick="setCount('25',this)">25</button>
        <button onclick="setCount('50',this)">50</button>
        <button class="active" onclick="setCount('all',this)">All</button>
      </div>
      <button class="btn primary" onclick="startQuiz()" style="margin-left:auto">▶ Start Quiz</button>
      <button class="btn shuffle" onclick="startShuffle()">🔀 Shuffle</button>
    </div>
    <input type="hidden" id="sel-count" value="all">
  </div>

  <!-- ACTIVE QUIZ -->
  <div id="pane-quiz" style="display:none">
    <div class="prog-wrap">
      <div class="prog-bar"><div class="prog-fill" id="prog"></div></div>
      <div class="prog-label">
        <span id="prog-txt"></span>
        <span id="prog-score"></span>
      </div>
    </div>
    <div id="q-render"></div>
    <div class="q-nav" id="q-nav">
      <button class="btn ghost" onclick="exitToSetup()">✕ Exit</button>
      <button class="btn ghost" id="btn-back" onclick="goBack()">← Back</button>
      <button class="btn ghost" onclick="resetQ()">↺ Reset</button>
      <button class="btn ghost" onclick="skipQ()">Skip</button>
      <button class="btn go" id="btn-next" onclick="nextQ()" style="display:none">Next →</button>
      <button class="btn sec" onclick="showResults()">✓ Done</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="pane-results" style="display:none">
    <div class="results">
      <div class="ring-wrap">
        <svg width="130" height="130" viewBox="0 0 130 130">
          <circle cx="65" cy="65" r="54" fill="none" stroke="var(--border)" stroke-width="11"/>
          <circle cx="65" cy="65" r="54" fill="none" stroke="var(--accent)" stroke-width="11"
            stroke-dasharray="339.3" stroke-dashoffset="339.3" id="ring-arc" stroke-linecap="round"/>
        </svg>
        <div class="ring-txt">
          <div class="ring-pct" id="r-pct">–</div>
          <div class="ring-sub">score</div>
        </div>
      </div>
      <h2 id="r-grade" style="margin-bottom:6px"></h2>
      <p id="r-msg" style="color:var(--muted);margin-bottom:20px"></p>
      <div class="stat-row">
        <div class="stat"><div class="val" id="r-cor">–</div><div class="lbl">Correct</div></div>
        <div class="stat"><div class="val" id="r-wrg">–</div><div class="lbl">Wrong</div></div>
        <div class="stat"><div class="val" id="r-skp">–</div><div class="lbl">Skipped</div></div>
      </div>
      <div class="act-row">
        <button class="btn sec" onclick="reviewAnswers()">Review Answers</button>
        <button class="btn" id="btn-retry-wrong" onclick="retryWrong()" style="background:linear-gradient(135deg,#ef4444,#b91c1c);display:none">↩ Retry Wrong</button>
        <button class="btn" onclick="backToSetup()">Try Again</button>
      </div>
    </div>
    <div id="review-out" style="margin-top:20px"></div>
  </div>

</div>

<!-- ══════════ BROWSE TAB ══════════ -->
<div class="page" id="page-browse">
  <h1>Browse All Questions</h1>
  <p class="sub">Scroll through every LO question with correct answers shown.</p>
  <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap">
    <input id="browse-search" type="text" placeholder="Search questions…"
      style="flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);
        border-radius:8px;padding:9px 14px;font-size:.875rem;min-width:180px;"
      oninput="renderBrowse()">
    <select id="browse-cat-filter" onchange="renderBrowse()"
      style="background:var(--card);border:1px solid var(--border);color:var(--text);
        border-radius:8px;padding:9px 12px;font-size:.875rem;cursor:pointer;appearance:none;min-width:160px;">
      <option value="all">All categories</option>
    </select>
    <button class="btn sec" onclick="document.getElementById('browse-search').value='';document.getElementById('browse-cat-filter').value='all';renderBrowse()">Clear</button>
  </div>
  <div id="browse-out"></div>
</div>

<!-- ══════════ PROGRESS TAB ══════════ -->
<div class="page" id="page-progress">
  <h1>My Progress</h1>
  <p class="sub">Saved across sessions — tracks every question you answer.</p>
  <div id="progress-content"></div>
  <div style="margin-top:12px">
    <button class="btn ghost" style="color:var(--red);border-color:rgba(239,68,68,.3)" onclick="clearProgress()">🗑 Clear All Progress</button>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────

  130:'Tapeworms lack a gut entirely. Their entire body surface (tegument) is covered in microvilli (microtriches) that absorb nutrients from the host\'s intestinal fluid.',
  131:'The ciliated epidermis of planarians beats against a mucus layer to glide smoothly over surfaces — the primary mode of locomotion.',

  40:'The three universal molluscan body parts are: muscular foot (locomotion), mantle (secretes shell, encloses mantle cavity), and visceral mass (contains digestive, reproductive, excretory organs).',
  41:'The mantle secretes the shell (when present) and forms the mantle cavity — the space housing the gills (or lung), receiving excretory openings and gametes.',
  42:'Mollusks have an open circulatory system. Blood (hemolymph) flows through open sinuses (the hemocoel), bathing organs directly rather than through closed vessels.',
  43:'The radula is a ribbon of chitin bearing many rows of teeth that rasps food off surfaces. Found in gastropods and cephalopods; absent in bivalves.',
  44:'The umbo is the oldest, most pointed part of the bivalve shell — where shell growth began. It always points toward the anterior end of the animal.',
  45:'Two adductor muscles (anterior and posterior) pull the shell valves closed. The elastic hinge ligament holds them open when muscles relax.',
  46:'Water enters via the incurrent (inhalant) siphon, flows over the gills (picking up O2 and depositing food particles), then exits via the excurrent (exhalant) siphon.',

  48:'Squid have 8 arms (lined with suckers along their entire length) and 2 longer tentacles (suckers only at the club). Total = 10 appendages.',
  49:'The 2 tentacles are longer than the arms and have suckers only at the expanded club tip. They shoot out rapidly to seize prey and retract.',
  50:'The pen (gladius) is the vestigial internal shell of squid — a transparent, feather-shaped chitinous structure that provides some rigidity to the body.',
  51:'The siphon (hyponome/funnel) directs a jet of water expelled from the mantle cavity for rapid locomotion. Direction of the jet controls direction of movement.',
  52:'The pneumostome is a pore in the mantle wall that opens into the mantle cavity, which functions as a vascularized lung for gas exchange in terrestrial gastropods.',
  53:'Class Polyplacophora = chitons. "Poly" = many, "placo" = plate. Eight overlapping dorsal shell plates and a broad muscular foot clinging to rocky substrates.',
  133:'Ink (melanin suspended in mucus) creates a dark cloud that obscures the predator\'s vision and may interfere with chemoreception, buying time to escape.',
  134:'Squid fins undulate for slow, precise maneuvering and stabilization. High-speed locomotion relies on siphon jet propulsion.',
  135:'The nidamental gland (females only) secretes the gelatinous or leathery casing material that encapsulates squid egg masses.',
  136:'The hard chitinous beak works like a parrot\'s beak — it bites and tears prey (fish, crustaceans). The beak is the only hard, indigestible part of a squid.',
  137:'Labial palps are ciliated folds flanking the mouth. They sort particles arriving from the gills and direct acceptable food into the mouth.',
  138:'The muscular foot of a bivalve extends into soft sediment, anchors by expanding its tip, and then contracts to pull the body forward — burrowing locomotion.',
  139:'The two brachial hearts each pump deoxygenated blood to one gill for oxygenation. The single systemic heart then pumps oxygenated blood to the body tissues.',
  140:'Loligo (also sold as Doryteuthis) is the common market squid used in BIO 212 lab dissections.',
  141:'The digestive gland (hepatopancreas) secretes digestive enzymes into the stomach and absorbs the resulting nutrient-rich fluid.',
  142:'Gastropods use rhythmic pedal waves — bands of muscle contraction that travel along the flat, ventral foot — to creep forward on a mucus track.',
  143:'The umbo always points anteriorly. The posterior end has the excurrent siphon, hinge ligament, and the larger posterior adductor muscle.',
  198:'In gastropods the mantle is the large dorsal sheet of tissue that covers the visceral mass. In shelled snails it secretes the shell; in slugs it forms the saddle-like dorsal lobe.',
  199:'The pneumostome is the breathing pore on the right side of the mantle. It opens and closes rhythmically to regulate gas exchange with the environment.',
  200:'The pneumostome opens into the mantle cavity, which is richly vascularized and functions as a simple lung — O2 diffuses in, CO2 diffuses out.',
  201:'Terrestrial gastropods replaced aquatic gills with a vascularized mantle cavity (pulmonary cavity). Air enters through the pneumostome and gas exchange occurs across the cavity walls.',

  54:'The clitellum is a swollen, glandular band (segments 32–37 in Lumbricus) that secretes mucus during mating and a cocoon around fertilized eggs.',
  55:'Setae are short, stiff chitinous bristles anchored in the body wall. They grip the substrate so longitudinal muscles can pull the worm forward without it slipping back.',
  56:'Septa are fibromuscular walls between segments. They keep each segment\'s coelomic fluid compartmentalized, allowing independent hydrostatic pressure for locomotion.',
  57:'The typhlosole is a dorsal infolding of the intestinal wall that increases absorptive surface area — analogous to intestinal villi in vertebrates.',
  58:'Nephridia are tubular excretory organs — one pair per segment — that remove nitrogenous waste and excess water from the coelomic fluid.',

  145:'Longitudinal muscle contraction → segment shortens and gets fatter. Circular muscle contraction → segment elongates and gets thinner. These alternating contractions produce peristaltic locomotion.',
  146:'Polychaetes are almost entirely marine, living in ocean sediments, on coral reefs, or in the water column. They are the dominant annelids in the sea.',

  148:'Seminal vesicles store sperm and allow them to mature. During copulation they are positioned adjacent to the other worm\'s seminal receptacles.',

  67:'Pseudocoel = body cavity NOT fully lined by mesoderm. Mesoderm lines only the outer wall (body wall). A true coelom is lined by mesoderm on BOTH inner and outer surfaces.',
  68:'The collagen-rich cuticle is secreted by the underlying epidermis and protects nematodes against host digestive enzymes, immune attack, and physical abrasion.',
  69:'Because the cuticle is rigid, nematodes grow by ecdysis (molting) — shedding the old cuticle and secreting a new, larger one. This is the defining feature of Ecdysozoa.',

  76:'Chelicerae are the first pair of appendages in Chelicerata. In spiders they are modified as hollow fangs that inject venom; in horseshoe crabs they are small pincers for feeding.',

  78:'Chelipeds are the large, claw-bearing first pair of walking legs (pereiopods 1) of decapod crustaceans. Used for defense, prey capture, and signaling.',
  79:'Maxillipeds are mouth appendages just anterior to the walking legs. In crayfish there are three pairs; they hold and manipulate food while other mouthparts chew it.',
  80:'Spiracles are valve-like openings in the insect exoskeleton that lead into branching tracheal tubes. O2 diffuses directly to tissues via these tubes — no blood-mediated gas transport.',

  88:'The four animal tissue types are: Epithelial (covering/lining), Connective (support/binding), Muscle (contraction), Nervous (signaling). Every body part is made from combinations of these.',
  89:'Chondrocytes are cartilage cells that sit in lacunae (spaces) within a flexible matrix of type II collagen and proteoglycans. Cartilage is avascular (no blood vessels).',
  90:'Osteocytes are mature bone cells trapped in lacunae within mineralized bone matrix (hydroxyapatite crystals embedded in collagen). They maintain the bone matrix.',

  93:'Simple squamous epithelium is a single layer of flat cells — very thin cytoplasm minimizes diffusion distance. Lines blood and lymph vessels (endothelium) and air sacs (alveoli).',

  97:'Goblet cells are shaped like a goblet because of the large mucus droplet in their apical cytoplasm. Mucus they secrete traps pathogens and lubricates the gut and respiratory tract.',

  163:'Smooth muscle is found in the walls of blood vessels, the digestive tract, urinary bladder, and uterus. It contracts slowly and involuntarily under autonomic nervous and hormonal control.',

let pool = [], qi = 0, answers = [], answered = false, fibLastVal = null;

let displayOrder = [];
let freeTextMode = true;

// ── PROGRESS ──────────────────────────────────────────────────────────────────
const PROG_KEY = 'bio212_lo_progress';
function loadProgress() { try { return JSON.parse(localStorage.getItem(PROG_KEY) || '{}'); } catch { return {}; } }
function saveProgress(d) { localStorage.setItem(PROG_KEY, JSON.stringify(d)); }

function recordAnswer(q, ok) {
  const d = loadProgress();
  const k = String(q.id);
  if (!d[k]) d[k] = {a:0,c:0,w:0,t:null};
  d[k].a++; if (ok) d[k].c++; else d[k].w++;
  d[k].t = new Date().toISOString();
  saveProgress(d);
  renderCategoryPills();
  updatePoolPreview();
}

function isStruggling(s) { return s && s.a >= 2 && s.c / s.a < 0.6; }

function getStrugglingIds() {
  const d = loadProgress();
  return Object.entries(d).filter(([,s]) => isStruggling(s)).map(([id]) => parseInt(id));
}

function clearProgress() {
  if (!confirm('Clear all LO quiz progress? This cannot be undone.')) return;
  localStorage.removeItem(PROG_KEY);
  renderProgress();
  renderCategoryPills();
  updatePoolPreview();
}

// ── CATEGORY UI ───────────────────────────────────────────────────────────────
function renderCategoryPills() {
  const container = document.getElementById('cat-pills');
  const counts = {};
  LO_DATA.forEach(q => { counts[q.cat] = (counts[q.cat]||0)+1; });

  let html = '';
  for (const cat of CATS) {
    const n = counts[cat.id] || 0;
    if (!n) continue;
    const on = activeCats.size === 0 || activeCats.has(cat.id);
    const color = cat.color;
    const bs = on ? `border-color:${color};` : `border-color:${color}44;`;
    const bg = on ? `background:${color}18;color:var(--text);` : '';
    html += `<div class="cat-group">
      <span class="cat-pill${on ? ' on' : ''}" data-cat="${cat.id}" onclick="toggleCat('${cat.id}')"
        style="${bs}${bg}">
        <span class="cp-icon">${cat.icon}</span>
        <span class="cp-label">${cat.label}</span>
        <span class="cp-count">${n}q</span>
      </span>
    </div>`;
  }

  const strugCount = getStrugglingIds().length;
  if (strugCount > 0) {
    const on = activeCats.size === 0 || activeCats.has('__struggling__');
    html += `<div class="cat-group"><span class="cat-pill struggling${on ? ' on' : ''}"
      data-cat="__struggling__" onclick="toggleCat('__struggling__')">
      <span class="cp-icon">⚠️</span><span class="cp-label">Struggling</span>
      <span class="cp-count">${strugCount}q</span>
    </span></div>`;
  }

  container.innerHTML = html;
}

function toggleCat(id) {
  if (activeCats.size === 0) {
    activeCats = new Set([id]);
  } else if (activeCats.has('__none__')) {
    activeCats = new Set([id]);
  } else {
    if (activeCats.has(id)) {
      activeCats.delete(id);
      if (activeCats.size === 0) activeCats = new Set(['__none__']);
    } else {
      activeCats.add(id);
      const allIds = CATS.map(c => c.id);
      if (allIds.every(c => activeCats.has(c))) activeCats = new Set();
    }
  }
  renderCategoryPills();
  updatePoolPreview();
}

function toggleAllCats() {
  activeCats = (activeCats.size === 0) ? new Set(['__none__']) : new Set();
  renderCategoryPills();
  updatePoolPreview();
}

function updatePoolPreview() {
  const p = buildPool(false);
  const el = document.getElementById('pool-preview');
  if (el) el.textContent = p.length
    ? `${p.length} question${p.length !== 1 ? 's' : ''} match your filters`
    : 'No questions match — select at least one category above';
}

// ── TAB NAV ───────────────────────────────────────────────────────────────────
function showTab(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if (btn) btn.classList.add('active');
  if (id === 'progress') renderProgress();
  if (id === 'browse') renderBrowse();
  try { window.parent.postMessage({type:'tabChange', tab:id}, '*'); } catch(e){}
}

// ── QUIZ SETUP ────────────────────────────────────────────────────────────────
function buildPool(shuffle) {
  const count = document.getElementById('sel-count').value;
  let p = [...LO_DATA];

  if (activeCats.size > 0) {
    if (activeCats.has('__none__')) {
      p = [];
    } else {
      const strugIds = activeCats.has('__struggling__') ? new Set(getStrugglingIds()) : null;
      const regCats = new Set([...activeCats].filter(c => c !== '__struggling__'));
      p = p.filter(q =>
        (strugIds && strugIds.has(q.id)) ||
        (regCats.size > 0 && regCats.has(q.cat))
      );
    }
  }

  if (shuffle) shuffleArr(p);
  if (count !== 'all') p = p.slice(0, parseInt(count));
  return p;
}

function startQuiz()    { launch(true); }
function startShuffle() { launch(true); }

function launch(shuffle) {
  pool = buildPool(shuffle);
  if (!pool.length) {
    document.getElementById('pool-preview').textContent =
      '⚠ No questions match — select at least one category above';
    return;
  }
  qi      = 0;
  answers = new Array(pool.length).fill(null);
  document.getElementById('pane-setup').style.display   = 'none';
  document.getElementById('pane-quiz').style.display    = 'block';
  document.getElementById('pane-results').style.display = 'none';
  renderQ();
}

function setAnswerMode(m) {
  freeTextMode = m === 'ft';
  document.getElementById('mode-mc').classList.toggle('active', !freeTextMode);
  document.getElementById('mode-ft').classList.toggle('active',  freeTextMode);
}

function setCount(val, btn) {
  document.getElementById('sel-count').value = val;
  document.querySelectorAll('.count-seg button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updatePoolPreview();
}

// ── RENDER QUESTION ───────────────────────────────────────────────────────────
function handleFibKey(e, checkFn) {
  if (e.key !== 'Enter') return;
  const inp = document.getElementById('fib-inp');
  const val = inp.value.trim().toLowerCase();
  if (!val) return;
  if (answered && val === fibLastVal) {
    nextQ();
  } else {
    answered = false;
    fibLastVal = val;
    checkFn();
  }
}

function renderQ() {
  answered = false;
  fibLastVal = null;
  const q = pool[qi];

  const pct = qi / pool.length * 100;
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('prog-txt').textContent = `Question ${qi + 1} / ${pool.length}`;
  const cor = answers.slice(0, qi).filter(a => a === true).length;
  document.getElementById('prog-score').textContent = `${cor} correct`;
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('btn-back').disabled = (qi === 0);

  const catObj = CATS.find(c => c.id === q.cat) || {label:q.cat, color:'#4f8ef7', icon:'📋'};

  let html = `<div class="q-card" style="border-top:3px solid ${catObj.color};">
    <div class="q-header">
      <span class="q-num">Q${qi + 1}</span>
      <span class="q-tag" style="background:${catObj.color}18;color:${catObj.color}">${catObj.label}</span>
      <span class="q-pts">1 pt</span>
    </div>
    <div class="q-body">${escHtml(q.q)}</div>`;

  if (freeTextMode) {
    html += `<div class="fib-wrap">
      <input class="fib-input" id="fib-inp" placeholder="Type your answer…"
        onkeydown="handleFibKey(event,checkFreeText)">
    </div>`;
  } else {
    const idxs = q.a.map((_, i) => i);
    shuffleArr(idxs);
    displayOrder = idxs;
    const letters = ['A','B','C','D','E'];
    html += '<div class="opts">';
    idxs.forEach((origIdx, di) => {
      html += `<div class="opt" id="opt${di}" onclick="pickMC(${di},${origIdx === q.c})"
        style="animation-delay:${di*0.06}s">
        <div class="ltr">${letters[di]}</div>
        <span>${escHtml(q.a[origIdx])}</span>
      </div>`;
    });
    html += '</div>';
  }

  html += '<div class="feedback" id="fb"></div></div>';
  document.getElementById('q-render').innerHTML = html;
  document.getElementById('q-render').scrollIntoView({behavior:'smooth', block:'start'});
  // input NOT auto-focused; spacebar activates it (see keydown handler)
}

// ── ANSWER HANDLERS ───────────────────────────────────────────────────────────
function pickMC(displayIdx, isCorrect) {
  if (answered) return;
  answered = true;
  const q = pool[qi];
  const correctDisplayIdx = displayOrder.indexOf(q.c);

  document.querySelectorAll('.opt').forEach((el, j) => {
    el.classList.add('locked');
    if (j === correctDisplayIdx) el.classList.add('correct');
    if (j === displayIdx && !isCorrect) el.classList.add('wrong');
  });

  answers[qi] = isCorrect;
  recordAnswer(q, isCorrect);
  showFeedback(isCorrect, q.a[q.c], LO_EXP[q.id]);
  document.getElementById('btn-next').style.display = 'block';
}

function checkFreeText() {
  const inp = document.getElementById('fib-inp');
  const val = inp.value.trim().toLowerCase();
  if (!val) return;
  const q = pool[qi];
  const correctText = q.a[q.c];

  // Build all accepted forms from official answer + per-question extra list
  const baseAccepted = buildAcceptedForms(correctText);
  const extra = (LO_ACCEPTED[q.id] || []).flatMap(s => buildAcceptedForms(s));
  const allForms = [...new Set([...baseAccepted, ...extra])];

  // Fuzzy match against any accepted form
  let ok = allForms.some(f => fuzzyMatch(val, f));

  // Keyword-all-required check (for unordered multi-item answers)
  if (!ok && LO_KEYWORDS[q.id]) {
    ok = LO_KEYWORDS[q.id].every(k => val.includes(k));
  }

  answers[qi] = ok;
  answered = true;
  inp.classList.remove('correct', 'wrong');
  inp.classList.add(ok ? 'correct' : 'wrong');
  recordAnswer(q, ok);
  showFeedback(ok, correctText, LO_EXP[q.id]);
  document.getElementById('btn-next').style.display = 'block';
}

function showFeedback(ok, correctText, exp) {
  const fb = document.getElementById('fb');
  fb.className = 'feedback show ' + (ok ? 'ok' : 'no');
  const verdict = ok
    ? '<strong>✓ Correct!</strong>'
    : `<strong>✗ Incorrect. Correct answer: ${escHtml(correctText || '')}</strong>`;
  const expHtml = exp ? `<div class="exp">${escHtml(exp)}</div>` : '';
  fb.innerHTML = verdict + expHtml;
}

function buildAcceptedForms(text) {
  text = (text || '').toLowerCase().trim();
  const forms = new Set();
  function add(s) {
    s = s.trim();
    if (s.length < 1) return;
    forms.add(s);
    if (s.length < 2) return;
    // space-collapsed version
    forms.add(s.replace(/\s+/g, ''));
    // punctuation-stripped version (for sequence answers with arrows/commas)
    const dep = s.replace(/[→←↔\-–—,\.;:!?\/\\()]/g, ' ').replace(/\s+/g, ' ').trim();
    if (dep && dep !== s) { forms.add(dep); forms.add(dep.replace(/\s+/g,'')); }
    if (s.endsWith('es')) forms.add(s.slice(0, -2));
    else if (s.endsWith('s')) forms.add(s.slice(0, -1));
    else { forms.add(s + 's'); forms.add(s + 'es'); }
  }
  add(text);
  const aka = text.match(/\(aka\s*([^)]+)\)/i);
  if (aka) add(aka[1]);
  const stripped = text.replace(/\s*\([^)]+\)/g, '').trim();
  if (stripped && stripped !== text) add(stripped);
  const keywords = text
    .replace(/[:\-–—,\.;→←↔]/g, ' ')
    .replace(/\b(is|are|on|the|a|an|of|and|in|at|to|was|be|its|it|this|that|also|by|for|as|with|from|or|both|used)\b/g, ' ')
    .replace(/\s+/g, ' ').trim();
  if (keywords && keywords !== text) add(keywords);
  return [...forms].filter(f => f.length >= 1);
}

function fuzzyMatch(val, form) {
  // Strip punctuation (arrows, commas, parens, etc.) before comparing
  const clean = s => s.toLowerCase()
    .replace(/[→←↔\-–—,\.;:!?\/\\()]/g, '')
    .replace(/\s+/g, '');
  const nv = clean(val);
  const nf = clean(form);
  if (!nf || !nv) return false;
  if (nf.length <= 2 || nv.length <= 2) return nv === nf;
  return nv === nf || nv.includes(nf) || nf.includes(nv);
}

function isCorrect(q, ans) {
  if (ans === null) return false;
  return ans === true;
}

function goBack() {
  if (qi === 0) return;
  qi--;
  answers[qi] = null;
  answered = false;
  renderQ();
}

function resetQ() {
  answers[qi] = null;
  answered = false;
  renderQ();
}

function skipQ() {
  if (!answered) answers[qi] = null;
  nextQ();
}

function nextQ() {
  qi++;
  if (qi >= pool.length) { showResults(); return; }
  renderQ();
}

function exitToSetup() { backToSetup(); }

function backToSetup() {
  document.getElementById('pane-setup').style.display   = 'block';
  document.getElementById('pane-quiz').style.display    = 'none';
  document.getElementById('pane-results').style.display = 'none';
  document.getElementById('review-out').innerHTML = '';
}

// ── RESULTS ───────────────────────────────────────────────────────────────────
function showResults() {
  document.getElementById('pane-quiz').style.display    = 'none';
  document.getElementById('pane-results').style.display = 'block';
  const cor = answers.filter((a, i) => isCorrect(pool[i], a)).length;
  const skp = answers.filter(a => a === null).length;
  const wrg = pool.length - cor - skp;
  const pct = Math.round(cor / pool.length * 100);

  document.getElementById('r-pct').textContent = pct + '%';
  document.getElementById('r-cor').textContent = cor;
  document.getElementById('r-wrg').textContent = wrg;
  document.getElementById('r-skp').textContent = skp;
  document.getElementById('r-msg').textContent  = `${cor} of ${pool.length} correct · ${skp} skipped`;

  const arc = document.getElementById('ring-arc');
  const C = 339.3;
  arc.style.strokeDashoffset = C - (pct / 100) * C;
  arc.style.stroke = pct >= 80 ? 'var(--green)' : pct >= 60 ? 'var(--amber)' : 'var(--red)';

  const grades = ['Keep Studying 📖','Getting There 💪','Good Work 👍','Great Job ⭐','Excellent! 🏆'];
  document.getElementById('r-grade').textContent = grades[Math.min(Math.floor(pct / 20), 4)];

  const retryBtn = document.getElementById('btn-retry-wrong');
  retryBtn.style.display = (wrg + skp > 0) ? 'inline-flex' : 'none';
  retryBtn.textContent = `↩ Retry ${wrg + skp} Wrong${skp ? ' + Skipped' : ''}`;

  document.getElementById('review-out').innerHTML = '';
}

function reviewAnswers() {
  const letters = ['A','B','C','D','E'];
  let html = '<h2 style="margin-bottom:14px">Answer Review</h2>';
  pool.forEach((q, i) => {
    const ua = answers[i];
    const ok = isCorrect(q, ua);
    const sk = ua === null;
    const status = sk ? '⊖ Skipped' : ok ? '✓ Correct' : '✗ Incorrect';
    const col = sk ? 'var(--muted)' : ok ? 'var(--green)' : 'var(--red)';
    const catObj = CATS.find(c => c.id === q.cat) || {label:q.cat, color:'#4f8ef7', icon:'📋'};
    html += `<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;
        padding:14px 16px;margin-bottom:10px">
      <div style="font-size:.72rem;font-weight:700;color:${col};margin-bottom:4px">${status}</div>
      <div style="font-size:.78rem;color:${catObj.color};margin-bottom:8px">${catObj.label}</div>
      <div style="font-size:.88rem;line-height:1.6;margin-bottom:8px">${escHtml(q.q)}</div>
      <div class="browse-answers">`;
    if (freeTextMode) {
      html += `<div class="ba ok">
        <div class="bk">✓</div>
        <span style="font-size:.82rem">${escHtml(q.a[q.c])}</span>
      </div>`;
    } else {
      q.a.forEach((ans, j) => {
        const isC = j === q.c;
        html += `<div class="ba${isC ? ' ok' : ''}">
          <div class="bk">${isC ? '✓' : letters[j]}</div>
          <span style="font-size:.82rem">${escHtml(ans)}</span>
        </div>`;
      });
    }
    html += '</div>';
    const exp = LO_EXP[q.id];
    if (exp) html += `<div style="padding:4px 16px 12px;font-size:.78rem;color:var(--muted);font-style:italic;line-height:1.55">${escHtml(exp)}</div>`;
    html += '</div>';
  });
  document.getElementById('review-out').innerHTML = html;
  document.getElementById('review-out').scrollIntoView({behavior:'smooth'});
}

function retryWrong() {
  const retryPool = pool.filter((q, i) => !isCorrect(q, answers[i]));
  if (!retryPool.length) return;
  pool    = shuffleArr([...retryPool]);
  qi      = 0;
  answers = new Array(pool.length).fill(null);
  document.getElementById('pane-results').style.display = 'none';
  document.getElementById('review-out').innerHTML = '';
  document.getElementById('pane-quiz').style.display = 'block';
  renderQ();
}

function startStrugglingQuiz() {
  activeCats = new Set(['__struggling__']);
  renderCategoryPills();
  updatePoolPreview();
  showTab('quiz', document.getElementById('nav-btn-quiz'));
}

// ── BROWSE ────────────────────────────────────────────────────────────────────
function renderBrowse() {
  const search = (document.getElementById('browse-search').value || '').toLowerCase();
  const catFilter = document.getElementById('browse-cat-filter').value;
  const letters = ['A','B','C','D','E'];
  let shown = 0;
  let html = '';

  LO_DATA.forEach(q => {
    if (catFilter !== 'all' && q.cat !== catFilter) return;
    if (search && !q.q.toLowerCase().includes(search) && !q.a.some(a => a.toLowerCase().includes(search))) return;
    shown++;
    const catObj = CATS.find(c => c.id === q.cat) || {label:q.cat, color:'#4f8ef7', icon:'📋'};
    html += `<div class="browse-q">
      <div class="browse-header">
        <span>Q${q.id}</span>
        <span style="color:${catObj.color}">${catObj.label}</span>
        <span style="margin-left:auto">1 pt</span>
      </div>
      <div class="browse-body">${escHtml(q.q)}</div>
      <div class="browse-answers">`;
    q.a.forEach((ans, i) => {
      const ok = i === q.c;
      html += `<div class="ba${ok ? ' ok' : ''}">
        <div class="bk">${ok ? '✓' : letters[i]}</div>
        <span style="font-size:.82rem">${escHtml(ans)}</span>
      </div>`;
    });
    html += '</div>';
    const exp = LO_EXP[q.id];
    if (exp) html += `<div style="padding:6px 16px 12px;font-size:.78rem;color:var(--muted);font-style:italic;line-height:1.55">${escHtml(exp)}</div>`;
    html += '</div>';
  });

  if (!shown) html = '<div class="empty"><h2>No matches</h2><p>Try a different search or category.</p></div>';
  document.getElementById('browse-out').innerHTML = html;
}

// ── PROGRESS PAGE ─────────────────────────────────────────────────────────────
function renderProgress() {
  const d = loadProgress();
  const keys = Object.keys(d);
  if (!keys.length) {
    document.getElementById('progress-content').innerHTML =
      '<div class="empty"><h2>No data yet</h2><p>Answer some quiz questions to start tracking your progress.</p></div>';
    return;
  }

  const totalA = keys.reduce((s,k) => s + d[k].a, 0);
  const totalC = keys.reduce((s,k) => s + d[k].c, 0);
  const totalW = keys.reduce((s,k) => s + d[k].w, 0);
  const totalQ = keys.length;
  const acc = totalA > 0 ? Math.round(totalC / totalA * 100) : 0;
  const accColor = acc >= 80 ? 'var(--green)' : acc >= 60 ? 'var(--amber)' : 'var(--red)';

  const struggling = getStrugglingIds();

  let html = `<div class="pg-title">Overall</div>
  <div class="ov-grid">
    <div class="ov-card"><div class="ov-v">${totalQ}</div><div class="ov-l">Questions<br>Attempted</div></div>
    <div class="ov-card"><div class="ov-v" style="color:var(--green)">${totalC}</div><div class="ov-l">Correct<br>Answers</div></div>
    <div class="ov-card"><div class="ov-v" style="color:var(--red)">${totalW}</div><div class="ov-l">Wrong<br>Answers</div></div>
    <div class="ov-card"><div class="ov-v" style="color:${accColor}">${acc}%</div><div class="ov-l">Overall<br>Accuracy</div></div>
  </div>`;

  if (struggling.length > 0) {
    html += `<div class="struggle-banner">
      <div>
        <h3>⚠ ${struggling.length} Struggling Question${struggling.length !== 1 ? 's' : ''}</h3>
        <p>Correct less than 60% of the time after 2+ attempts</p>
      </div>
      <button class="btn" style="background:var(--amber);color:#000;font-size:.82rem;white-space:nowrap"
        onclick="startStrugglingQuiz()">Practice These →</button>
    </div>`;
  }

  html += `<div class="pg-title">By Category</div><div>`;
  for (const cat of CATS) {
    const qs = LO_DATA.filter(q => q.cat === cat.id);
    if (!qs.length) continue;
    const tried = qs.filter(q => d[String(q.id)]);
    const catA = tried.reduce((s,q) => s + (d[String(q.id)]?.a || 0), 0);
    const catC = tried.reduce((s,q) => s + (d[String(q.id)]?.c || 0), 0);
    const catAcc = catA > 0 ? Math.round(catC / catA * 100) : null;
    const catStruggling = qs.filter(q => isStruggling(d[String(q.id)])).length;

    const barColor = catAcc === null ? 'var(--border)'
      : catAcc >= 80 ? 'var(--green)' : catAcc >= 60 ? 'var(--amber)' : 'var(--red)';
    const accText = catAcc !== null ? `${catAcc}%` : '—';

    let badge = `<span style="color:var(--muted)">${tried.length}/${qs.length} tried</span>`;
    if (catAcc !== null) {
      if (catAcc >= 80)      badge = `<span style="color:var(--green)">✓ Doing well</span>`;
      else if (catAcc >= 60) badge = `<span style="color:var(--amber)">~ Getting there</span>`;
      else                   badge = `<span style="color:var(--red)">⚠ Needs work</span>`;
    }
    if (catStruggling > 0) badge += `<br><span style="color:var(--amber)">${catStruggling} struggling</span>`;

    html += `<div class="cat-row">
      <div class="cr-name">${cat.icon} ${cat.label}</div>
      <div class="cr-bar"><div class="cr-fill" style="width:${catAcc||0}%;background:${barColor}"></div></div>
      <div class="cr-acc" style="color:${barColor}">${accText}</div>
      <div class="cr-badge">${badge}</div>
    </div>`;
  }
  html += '</div>';
  document.getElementById('progress-content').innerHTML = html;
}

// ── UTILITIES ─────────────────────────────────────────────────────────────────
function shuffleArr(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── KEYBOARD ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const inInput = document.activeElement && document.activeElement.tagName === 'INPUT';
  const quizActive = document.getElementById('pane-quiz').style.display !== 'none';
  if (!quizActive) return;
  if (e.key === ' ' && !inInput && freeTextMode) {
    e.preventDefault();
    const fibInp = document.getElementById('fib-inp');
    if (fibInp && !answered) fibInp.focus();
    return;
  }
  if (e.key === 'ArrowRight') { e.preventDefault(); skipQ(); }
  if (e.key === 'ArrowLeft'  && !inInput) goBack();
  if (e.key === 'Enter'      && !inInput) {
    const btn = document.getElementById('btn-next');
    if (btn && btn.style.display !== 'none') nextQ();
  }
  if (e.key === 'Escape') exitToSetup();
});

// ── PARENT FRAME TAB COMMANDS ─────────────────────────────────────────────────
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'gotoTab') showTab(e.data.tab, null);
});

// ── INIT ──────────────────────────────────────────────────────────────────────
(function init() {
  document.getElementById('setup-q-count').textContent = LO_DATA.length;
  renderCategoryPills();
  updatePoolPreview();

  const sel = document.getElementById('browse-cat-filter');
  CATS.forEach(cat => {
    const count = LO_DATA.filter(q => q.cat === cat.id).length;
    if (!count) return;
    const opt = document.createElement('option');
    opt.value = cat.id;
    opt.textContent = `${cat.icon} ${cat.label} (${count})`;
    sel.appendChild(opt);
  });

  renderBrowse();
})();

// ── BARE MODE (hide nav when embedded in iframe) ───────────────────────────────
if (new URLSearchParams(location.search).get('bare') === '1') {
  document.querySelector('nav').style.display = 'none';
  document.querySelectorAll('.page').forEach(p => p.style.paddingTop = '28px');
}
</script>
